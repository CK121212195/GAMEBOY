<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなのジェネシス・ブロック (Twitch Plays HODL)</title>
    <link rel="stylesheet" href="style.css">
    <!-- QRコード生成ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 左側：ゲーム画面とチャート -->
        <div class="game-area">
            <div class="header">
                <h1>みんなのジェネシス・ブロック</h1>
                <p>現在地: ブロック高 <span id="block-height">840,000</span></p>
            </div>
            
            <div class="screen">
                <!-- 背景：TradingViewチャート -->
                <div id="tradingview-widget">
                    <div class="tradingview-widget-container">
                      <div id="tv_chart"></div>
                      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                      <script type="text/javascript">
                      new TradingView.widget({
                        "autosize": true,
                        "symbol": "BINANCE:BTCUSDT",
                        "interval": "1",
                        "timezone": "Asia/Tokyo",
                        "theme": "dark",
                        "style": "3",
                        "locale": "ja",
                        "enable_publishing": false,
                        "backgroundColor": "rgba(0, 0, 0, 1)",
                        "hide_top_toolbar": true,
                        "save_image": false,
                        "container_id": "tv_chart"
                      });
                      </script>
                    </div>
                </div>

                <!-- キャラクター表示 -->
                <div class="character-container">
                    <img id="character-img" src="https://illustcenter.com/wp-content/uploads/2021/10/epc0082.png" alt="Character">
                </div>
            </div>

            <div class="status-board">
                <h3>現在のコマンド勢力図 (進化への影響)</h3>
                <div class="bars">
                    <div>🛡️ HODL (ガチホ): <span id="score-HODL">0</span> pt</div>
                    <div>🚀 FOMO (イケイケ): <span id="score-FOMO">0</span> pt</div>
                    <div>📉 SELL (利確/損切): <span id="score-SELL">0</span> pt</div>
                    <div>🔧 BUIDL (開発): <span id="score-BUIDL">0</span> pt</div>
                </div>
                <p id="evolution-status" style="margin-top: 10px; color: #f7931a; font-weight: bold;">現在の状態：Genesis Egg</p>
            </div>
        </div>

        <!-- 右側：2ch風実況板＆コマンド入力 -->
        <div class="chat-area">
            <h2>実況掲示板</h2>
            <div id="chat-box" class="chat-box">
                <!-- コメントがここに追加される -->
            </div>

            <div class="input-area">
                <input type="text" id="user-name" placeholder="名前 (省略可: 名無しサトシ)" maxlength="15">
                <select id="command-select">
                    <option value="HODL">🛡️ HODL (ガチホ)</option>
                    <option value="FOMO">🚀 FOMO (イケイケ)</option>
                    <option value="BUIDL">🔧 BUIDL (開発)</option>
                    <option value="SELL">📉 SELL (売却)</option>
                </select>
                <input type="text" id="user-msg" placeholder="コメントを入力（おはぎゃー等）" maxlength="50">
                
                <div class="boost-option">
                    <input type="checkbox" id="boost-check">
                    <label for="boost-check" class="lightning-text">⚡ 1 satoshi 払って効力100倍にする (PoW)</label>
                </div>

                <button id="send-btn" onclick="sendMessage()">書き込む</button>
            </div>
            
            <!-- 決済モーダル -->
            <div id="payment-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h3>Lightning決済 (1 sat)</h3>
                    <p>このインボイスを支払うと、あなたのコマンドが100倍の力で反映されます！</p>
                    <div id="qrcode"></div>
                    <input type="text" id="invoice-text" readonly>
                    <p id="payment-status">支払い待ち...</p>
                    <button onclick="closeModal()">キャンセル</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
