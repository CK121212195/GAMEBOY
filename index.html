<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoっち - Lightning育成ゲーム</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        #device {
            background-color: #f1c40f;
            width: 300px;
            height: 400px;
            border-radius: 150px 150px 100px 100px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        #screen {
            background-color: #95a5a6;
            width: 200px;
            height: 200px;
            border-radius: 20px;
            margin-top: 30px;
            border: 4px solid #7f8c8d;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
        }
        #stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.1);
        }
        #character-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: all 0.3s ease;
        }
        .bounce { animation: bounce 0.5s infinite alternate; }
        .happy { animation: spin 1s; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        @keyframes spin { 100% { transform: rotate(360deg) scale(1.5); } }
        
        #buttons {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 30px;
        }
        .btn {
            background-color: #e74c3c;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #c0392b;
            cursor: pointer;
            box-shadow: 0 5px 0 #c0392b;
            font-size: 14px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        #logs { margin-top: 20px; font-size: 14px; text-align: center; height: 40px; }
        
        /* Lightning課金ボタン */
        #lightning-btn {
            margin-top: 20px;
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        #lightning-btn:hover { background-color: #e67e22; }
    </style>
</head>
<body>

    <div id="device">
        <div id="screen">
            <div id="stats">
                <span>満腹: <span id="hunger-val">10</span></span>
                <span>機嫌: <span id="happy-val">10</span></span>
            </div>
            <div id="character-area" class="bounce">🥚</div>
        </div>
        
        <div id="buttons">
            <div class="btn" onclick="feed()">🍚</div>
            <div class="btn" onclick="play()">🎾</div>
            <div class="btn" onclick="clean()">🧹</div>
        </div>
    </div>

    <button id="lightning-btn" onclick="tipSats()">⚡ 10 sats 投げ銭して進化！</button>
    
    <div id="logs">Satoっちが生まれそう...</div>

    <script>
        // キャラクターの進化ツリー（簡易版）
        const characters = [
            { stage: 0, emoji: '🥚', name: 'タマゴ' },
            { stage: 1, emoji: '🐥', name: 'ベビー' },
            { stage: 2, emoji: '🐧', name: 'キッズ' },
            { stage: 3, emoji: '🐉', name: 'ドラゴン（大人）' },
            { stage: -1, emoji: '🪦', name: 'お墓' }
        ];

        let state = {
            hunger: 5,
            happiness: 5,
            stage: 0,
            age: 0,
            isAlive: true
        };

        const charEl = document.getElementById('character-area');
        const hungerEl = document.getElementById('hunger-val');
        const happyEl = document.getElementById('happy-val');
        const logEl = document.getElementById('logs');

        function updateScreen() {
            if (!state.isAlive) return;

            hungerEl.innerText = state.hunger;
            happyEl.innerText = state.happiness;
            
            // 進化ロジック
            if (state.stage === 0 && state.age > 5) evolve(1);
            if (state.stage === 1 && state.age > 15) evolve(2);
            // ※ステージ3（大人）への進化は投げ銭（課金）でのみ発生するようにする

            // 死亡ロジック
            if (state.hunger <= 0 || state.happiness <= 0) {
                die();
            }
        }

        function evolve(newStage) {
            state.stage = newStage;
            charEl.innerText = characters.find(c => c.stage === newStage).emoji;
            logEl.innerText = `${characters.find(c => c.stage === newStage).name} に進化した！`;
            charEl.classList.add('happy');
            setTimeout(() => charEl.classList.remove('happy'), 1000);
        }

        function die() {
            state.isAlive = false;
            charEl.innerText = '🪦';
            charEl.classList.remove('bounce');
            logEl.innerText = "ブロックチェーンの海へ還りました...";
        }

        function feed() {
            if (!state.isAlive) return;
            state.hunger = Math.min(10, state.hunger + 2);
            logEl.innerText = "ご飯をたべた！";
            updateScreen();
        }

        function play() {
            if (!state.isAlive) return;
            state.happiness = Math.min(10, state.happiness + 2);
            state.hunger -= 1; // 遊ぶとお腹が減る
            logEl.innerText = "遊んでご機嫌！";
            updateScreen();
        }

        function clean() {
            if (!state.isAlive) return;
            logEl.innerText = "お部屋が綺麗になった！";
        }

        // WebLN (Lightning Network) を使った投げ銭シミュレーション
        async function tipSats() {
            if (!state.isAlive) {
                alert("お墓には投げ銭できません（お花をお供えする機能を今後追加！）");
                return;
            }

            try {
                // AlbyなどのWebLN拡張機能がブラウザにあるかチェック
                if (typeof window.webln !== 'undefined') {
                    await window.webln.enable();
                    logEl.innerText = "Lightning決済待ち...";
                    
                    // ※本来はバックエンド(LNbits等)でInvoiceを生成してここに渡す
                    // 今回はダミーの送金リクエスト（拡張機能が起動します）
                    await window.webln.keysend({
                        destination: "YOUR_NODE_PUBKEY", // 自分のノードまたはZebedee等のアドレス
                        amount: 10,
                        customRecords: {
                            696969: "Satoっちへの投げ銭"
                        }
                    });
                    
                    successTip();
                } else {
                    // WebLNがない場合のシミュレーション（通常ブラウザ用）
                    const conf = confirm("Lightning拡張機能が見つかりません。[OK]を押すと投げ銭が成功したと仮定してシミュレートします。");
                    if(conf) successTip();
                }
            } catch (err) {
                logEl.innerText = "決済がキャンセルされました。";
            }
        }

        function successTip() {
            logEl.innerText = "⚡10 sats ありがとう！！⚡";
            state.happiness = 10;
            state.hunger = 10;
            
            // 投げ銭をすると特別に大人（ドラゴン）に進化する
            if(state.stage < 3) {
                evolve(3);
                logEl.innerText = "投げ銭のパワーでレア進化！！";
            }
            
            charEl.classList.add('happy');
            setTimeout(() => charEl.classList.remove('happy'), 1000);
            updateScreen();
        }

        // 時間経過（ゲームループ）
        setInterval(() => {
            if (!state.isAlive) return;
            state.age += 1;
            
            // 時間経過でお腹と機嫌が減る
            if (state.age % 5 === 0) state.hunger -= 1;
            if (state.age % 8 === 0) state.happiness -= 1;
            
            updateScreen();
        }, 1000); // 1秒 = 1歳（テスト用設定）

    </script>
</body>
</html>
